<title>Project Detail — Supplier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/supplier/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="project-header">Loading…</div>

  <div class="card">
    <h2>Program</h2>
    <ul class="timeline" id="timeline"></ul>
  </div>

  <div class="card">
    <h2>Report a Defect</h2>
    <p class="muted">Found a manufacturing issue with this job? Let the team know.</p>
    <form id="issue-form">
      <label>Description<textarea name="description" rows="2" required placeholder="What's wrong?"></textarea></label>
      <label>Photo (optional)<input type="file" name="photo" accept="image/*"></label>
      <div class="actions"><button class="btn secondary" type="submit">Report Issue</button></div>
      <div class="error hidden" id="issue-error"></div>
    </form>
    <div id="issues-list" class="muted" style="margin-top:16px;">Loading…</div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const projectId = qs('id');

  (async () => {
    const user = await requireRole(['supplier']);
    if (!user) return;
    renderTopbar(user, 'Signage Portal — Supplier');
    await loadSafely(loadProject);
    await loadSafely(loadIssues);
  })();

  async function loadProject() {
    const { project } = await api('/projects/' + projectId);
    document.getElementById('project-header').innerHTML = `<h2>${escapeHtml(project.title)}</h2>`;
    document.getElementById('timeline').innerHTML = project.stages.map((s) => `
      <li class="${s.status}">
        <span class="dot">${s.status === 'complete' ? '✓' : s.stage_number}</span>
        <div class="timeline-info">
          <strong>${escapeHtml(s.name)}</strong>
          <div class="meta">${s.completed_at ? '📅 Completed ' + fmtDateShort(s.completed_at) : s.started_at ? '📅 Started ' + fmtDateShort(s.started_at) : ''}</div>
        </div>
        <span class="badge ${s.status}">${s.status.replace('_', ' ')}</span>
      </li>`).join('');
  }

  function renderIssueResponses(responses) {
    if (!responses.length) return '';
    return `<div class="issue-responses">${responses.map((r) => `
      <div class="issue-response">
        <div class="meta">${escapeHtml(r.responder_name)} &middot; ${fmtDate(r.created_at)} &middot; <span class="badge ${r.status}">${r.status.replace('_', ' ')}</span></div>
        ${r.description ? `<div>${escapeHtml(r.description)}</div>` : ''}
        ${r.has_photo ? `<a href="#" data-file-url="/api/project-issue-response-file/${r.id}">photo</a>` : ''}
      </div>`).join('')}</div>`;
  }

  async function loadIssues() {
    const { issues } = await api('/project-issues?projectId=' + projectId);
    const el = document.getElementById('issues-list');
    el.classList.remove('muted');
    el.innerHTML = issues.length ? issues.map((i) => `
      <div class="list-item issue-item">
        <div class="issue-item-header">
          <div>
            <div class="title">${escapeHtml(i.description)}</div>
            <div class="meta">${fmtDate(i.created_at)}${i.has_photo ? ' &middot; <a href="#" data-file-url="/api/project-issue-file/' + i.id + '">photo</a>' : ''}</div>
          </div>
          <span class="badge ${i.status}">${i.status.replace('_', ' ')}</span>
        </div>
        ${renderIssueResponses(i.responses)}
      </div>`).join('') : '<p class="muted">No issues reported.</p>';
    wireFileLinks(el);
  }

  document.getElementById('issue-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const photo = form.get('photo');
    const errorEl = document.getElementById('issue-error');
    errorEl.classList.add('hidden');
    if (photo && photo.size && fileTooLarge(photo)) {
      errorEl.textContent = `"${photo.name}" is larger than 50MB — please attach a smaller photo.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      if (photo && photo.size) {
        await uploadFileInChunks(photo, {
          kind: 'issue-photo',
          projectId,
          description: form.get('description'),
          contentType: photo.type || 'application/octet-stream',
        });
      } else {
        await api('/project-issues', { method: 'POST', body: { projectId, description: form.get('description') } });
      }
      e.target.reset();
      await loadIssues();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });
</script>
