<title>My Quotes &amp; Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <div class="card">
    <h2>Request a new quote</h2>
    <form id="quote-form">
      <label>Title<input type="text" name="title" required placeholder="e.g. Storefront illuminated sign"></label>
      <label>Description<textarea name="description" rows="3" placeholder="Size, material, mounting, deadline..."></textarea></label>
      <label>Quantity<input type="number" name="quantity" value="1" min="1"></label>
      <label>Attach files (optional)<input type="file" name="files" multiple></label>
      <div class="actions"><button class="btn" type="submit" id="quote-submit-btn">Submit Request</button></div>
      <p class="success-text hidden" id="quote-success">Quote request sent — you'll see it below once it's priced.</p>
      <div class="error hidden" id="quote-error"></div>
    </form>
  </div>

  <h2 class="section-heading">My Quotes</h2>
  <div id="quotes-list" class="item-list muted">Loading…</div>

  <h2 class="section-heading">My Projects</h2>
  <div id="projects-list" class="item-list muted">Loading…</div>
</main>
<script src="/js/api.js"></script>
<script>
  (async () => {
    const user = await requireRole(['client']);
    if (!user) return;
    renderTopbar(user, 'Signage Portal');
    await loadQuotes();
    await loadProjects();
  })();

  async function loadQuotes() {
    const { quotes } = await api('/quotes');
    const el = document.getElementById('quotes-list');
    el.classList.remove('muted');
    if (!quotes.length) { el.innerHTML = '<p class="muted">No quote requests yet.</p>'; return; }
    el.innerHTML = quotes.map((q) => `
      <a class="item-card" href="/client/quote.html?id=${q.id}">
        <div>
          <div class="title">${escapeHtml(q.title)}</div>
          <div class="meta">Requested ${fmtDate(q.created_at)}${q.client_price ? ' &middot; ' + fmtMoney(q.client_price) : ''}</div>
        </div>
        <span class="badge ${q.status}">${q.status}</span>
      </a>`).join('');
  }

  async function loadProjects() {
    const { projects } = await api('/projects');
    const el = document.getElementById('projects-list');
    el.classList.remove('muted');
    if (!projects.length) { el.innerHTML = '<p class="muted">No active projects yet.</p>'; return; }
    el.innerHTML = projects.map((p) => `
      <a class="item-card" href="/client/project.html?id=${p.id}">
        <div>
          <div class="title">${escapeHtml(p.title)}</div>
          <div class="meta">Stage ${p.current_stage} of 7</div>
        </div>
        <span class="badge ${p.status}">${p.status === 'complete' ? 'Complete' : 'In progress'}</span>
      </a>`).join('');
  }

  document.getElementById('quote-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const files = document.querySelector('input[name=files]').files;
    const errorEl = document.getElementById('quote-error');
    const successEl = document.getElementById('quote-success');
    const submitBtn = document.getElementById('quote-submit-btn');
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');
    for (const file of files) {
      if (fileTooLarge(file)) {
        errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
        errorEl.classList.remove('hidden');
        return;
      }
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';
    try {
      const { quote } = await api('/quotes', {
        method: 'POST',
        body: { title: form.get('title'), description: form.get('description'), quantity: Number(form.get('quantity')) || 1 },
      });
      for (const file of files) {
        await uploadFileInChunks(file, {
          kind: 'quote-file',
          quoteId: quote.id,
          filename: file.name,
          contentType: file.type || 'application/octet-stream',
        });
      }
      e.target.reset();
      successEl.classList.remove('hidden');
      await loadQuotes();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Request';
    }
  });
</script>
