<title>Quote Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/client/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="quote-card">Loading…</div>

  <div class="card">
    <h2>Documents</h2>
    <form id="file-form">
      <label>Attach a file<input type="file" name="file" required></label>
      <div class="actions"><button class="btn secondary" type="submit">Upload</button></div>
      <div class="error hidden" id="file-error"></div>
    </form>
    <div id="files-list" class="muted" style="margin-top:16px;">Loading…</div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const quoteId = qs('id');
  (async () => {
    const user = await requireRole(['client']);
    if (!user) return;
    renderTopbar(user, 'Signage Portal');
    await load();
    await loadFiles();
  })();

  async function load() {
    const { quote } = await api('/quotes/' + quoteId);
    const el = document.getElementById('quote-card');
    const actions = quote.status === 'priced'
      ? `<div class="actions">
           <button class="btn" id="accept-btn">Accept Quote</button>
           <button class="btn danger" id="decline-btn">Decline</button>
         </div>`
      : '';
    const priceLine = quote.client_price
      ? `<p><strong>Price:</strong> ${fmtMoney(quote.client_price)}</p>`
      : '<p class="muted">Pricing in progress — we will notify you once it is ready.</p>';
    const projectLink = quote.status === 'converted'
      ? '<p><a href="/client/dashboard.html">This quote is now a project — view it from your dashboard.</a></p>'
      : '';

    el.innerHTML = `
      <h2>${escapeHtml(quote.title)} <span class="badge ${quote.status}">${quote.status}</span></h2>
      <p class="muted">${escapeHtml(quote.description || '')}</p>
      <p><strong>Quantity:</strong> ${quote.quantity}</p>
      ${priceLine}
      ${projectLink}
      ${actions}
      <div class="error hidden" id="quote-error"></div>
    `;

    if (document.getElementById('accept-btn')) {
      document.getElementById('accept-btn').addEventListener('click', () => respond('accept'));
      document.getElementById('decline-btn').addEventListener('click', () => respond('decline'));
    }
  }

  async function respond(action) {
    try {
      await api('/quotes/' + quoteId, { method: 'PATCH', body: { action } });
      await load();
    } catch (err) {
      const errorEl = document.getElementById('quote-error');
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  }

  async function loadFiles() {
    const { files } = await api('/quote-files?quoteId=' + quoteId);
    const el = document.getElementById('files-list');
    el.classList.remove('muted');
    el.innerHTML = files.length
      ? files.map((f) => `
        <a class="list-item" href="/api/quote-file/${f.id}" target="_blank">
          <div>
            <div class="title">${escapeHtml(f.filename)}</div>
            <div class="meta">Uploaded ${fmtDate(f.created_at)}</div>
          </div>
        </a>`).join('')
      : '<p class="muted">No documents uploaded yet.</p>';
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('file-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const file = form.get('file');
    const errorEl = document.getElementById('file-error');
    errorEl.classList.add('hidden');
    try {
      const dataBase64 = await readFileAsBase64(file);
      await api('/quote-files', {
        method: 'POST',
        body: { quoteId, filename: file.name, contentType: file.type || 'application/octet-stream', dataBase64 },
      });
      e.target.reset();
      await loadFiles();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });
</script>
