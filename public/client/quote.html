<title>Quote Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/client/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="quote-card">Loading…</div>

  <div class="card">
    <h2>Documents</h2>
    <form id="file-form">
      <label>Attach a file<input type="file" name="file" required></label>
      <div class="actions"><button class="btn secondary" type="submit">Upload</button></div>
      <div class="error hidden" id="file-error"></div>
    </form>
    <div id="files-list" class="muted" style="margin-top:16px;">Loading…</div>
  </div>

  <div class="card">
    <h2>Q&amp;A</h2>
    <div class="qna-thread" id="qna-thread"></div>
    <form id="qna-form">
      <textarea name="message" rows="2" placeholder="Ask a question about your request..." required></textarea>
      <div class="actions"><button class="btn" type="submit">Send</button></div>
    </form>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const quoteId = qs('id');
  let currentUser;
  (async () => {
    currentUser = await requireRole(['client']);
    if (!currentUser) return;
    renderTopbar(currentUser, 'Signage Portal');
    await load();
    await loadFiles();
    await loadQna();
  })();

  async function load() {
    const { quote } = await api('/quotes/' + quoteId);
    const el = document.getElementById('quote-card');
    const actions = quote.status === 'priced'
      ? `<div class="actions">
           <button class="btn" id="accept-btn">Accept Quote</button>
           <button class="btn danger" id="decline-btn">Decline</button>
         </div>`
      : quote.status === 'accepted'
      ? `<div class="actions"><button class="btn secondary" id="unaccept-btn">Undo Accept</button></div>`
      : '';
    const priceLine = quote.client_price
      ? `<p><strong>Price:</strong> ${fmtMoney(quote.client_price)}</p>`
      : '<p class="muted">Pricing in progress — we will notify you once it is ready.</p>';
    const projectLink = quote.status === 'converted'
      ? '<p><a href="/client/dashboard.html">This quote is now a project — view it from your dashboard.</a></p>'
      : '';
    // Once team starts pricing, the request is locked in — editing after
    // that would silently invalidate a cost estimate calculated against the
    // old description/quantity.
    const editButton = quote.status === 'submitted'
      ? '<div class="actions"><button class="btn secondary" type="button" id="edit-toggle-btn">Edit Request</button></div>'
      : '';

    el.innerHTML = `
      <h2>${escapeHtml(quote.title)} <span class="badge ${quote.status}">${quote.status}</span></h2>
      <p class="muted">${escapeHtml(quote.description || '')}</p>
      <p><strong>Quantity:</strong> ${quote.quantity}</p>
      ${priceLine}
      ${projectLink}
      ${editButton}
      ${actions}
      <div id="edit-form-wrap" class="hidden">
        <form id="edit-form">
          <label>Title<input type="text" name="title" required value="${escapeHtml(quote.title)}"></label>
          <label>Description<textarea name="description" rows="3">${escapeHtml(quote.description || '')}</textarea></label>
          <label>Quantity<input type="number" name="quantity" min="1" value="${quote.quantity}"></label>
          <div class="actions">
            <button class="btn secondary" type="submit">Save Changes</button>
            <button class="btn secondary" type="button" id="edit-cancel-btn">Cancel</button>
          </div>
        </form>
      </div>
      <div class="error hidden" id="quote-error"></div>
    `;

    if (document.getElementById('accept-btn')) {
      document.getElementById('accept-btn').addEventListener('click', () => respond('accept'));
      document.getElementById('decline-btn').addEventListener('click', () => respond('decline'));
    }
    if (document.getElementById('unaccept-btn')) {
      document.getElementById('unaccept-btn').addEventListener('click', () => respond('unaccept'));
    }
    if (document.getElementById('edit-toggle-btn')) {
      document.getElementById('edit-toggle-btn').addEventListener('click', () => {
        document.getElementById('edit-form-wrap').classList.toggle('hidden');
      });
      document.getElementById('edit-cancel-btn').addEventListener('click', () => {
        document.getElementById('edit-form-wrap').classList.add('hidden');
      });
      document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const errorEl = document.getElementById('quote-error');
        errorEl.classList.add('hidden');
        try {
          await api('/quotes/' + quoteId, {
            method: 'PATCH',
            body: { action: 'edit', title: form.get('title'), description: form.get('description'), quantity: Number(form.get('quantity')) || 1 },
          });
          await load();
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.classList.remove('hidden');
        }
      });
    }
  }

  async function respond(action) {
    try {
      await api('/quotes/' + quoteId, { method: 'PATCH', body: { action } });
      await load();
    } catch (err) {
      const errorEl = document.getElementById('quote-error');
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  }

  async function loadFiles() {
    const { files } = await api('/quote-files?quoteId=' + quoteId);
    const el = document.getElementById('files-list');
    el.classList.remove('muted');
    el.innerHTML = files.length
      ? files.map((f) => `
        <div class="list-item">
          <a class="file-link" href="#" data-file-url="/api/quote-file/${f.id}">
            <div class="title">${escapeHtml(f.filename)}</div>
            <div class="meta">Uploaded by ${escapeHtml(f.uploaded_by_name)} (${f.uploaded_by_role}) &middot; ${fmtDate(f.created_at)}</div>
          </a>
          ${f.uploaded_by === currentUser.id ? `<button type="button" class="btn danger" data-delete-file="${f.id}">Delete</button>` : ''}
        </div>`).join('')
      : '<p class="muted">No documents uploaded yet.</p>';
    wireFileLinks(el);

    el.querySelectorAll('button[data-delete-file]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this document? This cannot be undone.')) return;
        await api('/quote-files/' + btn.dataset.deleteFile, { method: 'DELETE' });
        await loadFiles();
      });
    });
  }

  document.getElementById('file-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const file = form.get('file');
    const errorEl = document.getElementById('file-error');
    errorEl.classList.add('hidden');
    if (fileTooLarge(file)) {
      errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      await uploadFileInChunks(file, {
        kind: 'quote-file',
        quoteId,
        filename: file.name,
        contentType: file.type || 'application/octet-stream',
      });
      e.target.reset();
      await loadFiles();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  async function loadQna() {
    const { messages } = await api('/qna?quoteId=' + quoteId);
    const el = document.getElementById('qna-thread');
    el.innerHTML = messages.map((m) => `
      <div class="qna-msg ${m.sender_id === currentUser.id ? 'mine' : ''}">
        <div class="meta">${escapeHtml(m.sender_name)} (${m.sender_role}) &middot; ${fmtDate(m.created_at)}</div>
        <div>${escapeHtml(m.message)}</div>
      </div>`).join('') || '<p class="muted">No messages yet.</p>';
    el.scrollTop = el.scrollHeight;
  }

  document.getElementById('qna-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    await api('/qna', { method: 'POST', body: { quoteId, message: form.get('message') } });
    e.target.reset();
    await loadQna();
  });
</script>
