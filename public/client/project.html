<meta charset="utf-8">
<title>Project Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/client/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="project-header">Loading…</div>

  <div class="card">
    <h2>Program</h2>
    <div id="scheduled-section"></div>
    <ul class="timeline" id="timeline"></ul>
  </div>

  <div class="card">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="photos">Photos</button>
      <button class="tab-btn" data-tab="documents">Documents</button>
      <button class="tab-btn" data-tab="issues">Report an Issue</button>
      <button class="tab-btn" data-tab="qna">Q&amp;A</button>
    </div>

    <div class="tab-panel" data-panel="photos">
      <div id="photo-grid"></div>
    </div>

    <div class="tab-panel hidden" data-panel="documents">
      <form id="document-form">
        <label>Document<input type="file" name="document" required></label>
        <div class="actions"><button class="btn secondary" type="submit">Upload Document</button></div>
        <div class="error hidden" id="document-error"></div>
      </form>
      <div id="document-list" class="muted" style="margin-top:16px;">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="issues">
      <p class="muted">Noticed a problem with the install or the sign itself? Let us know.</p>
      <form id="issue-form">
        <label>Description<textarea name="description" rows="2" required placeholder="What's wrong?"></textarea></label>
        <label>Photo (optional)<input type="file" name="photo" accept="image/*"></label>
        <div class="actions"><button class="btn secondary" type="submit">Report Issue</button></div>
        <div class="error hidden" id="issue-error"></div>
      </form>
      <div id="issues-list" class="muted" style="margin-top:16px;">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="qna">
      <div class="qna-thread" id="qna-thread"></div>
      <form id="qna-form">
        <textarea name="message" rows="2" placeholder="Ask a question about your project..." required></textarea>
        <div class="actions"><button class="btn" type="submit">Send</button></div>
      </form>
    </div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const projectId = qs('id');
  let currentUser;
  let scheduledWorkItems = [];
  let stages = [];
  let stageNotes = [];
  let allPhotos = [];
  let designPacks = [];
  // Which sign-type groups are currently expanded — persisted across
  // re-renders (see the matching comment in team/project.html) so
  // collapsing/expanding never resets on its own.
  let stageItemExpandedTags = new Map();
  function getStageExpandedTags(stageNumber) {
    if (!stageItemExpandedTags.has(stageNumber)) stageItemExpandedTags.set(stageNumber, new Set());
    return stageItemExpandedTags.get(stageNumber);
  }
  // Which stages are currently expanded — collapsed by default (see the
  // matching comment in team/project.html), more than one at a time so two
  // stages can be compared side by side.
  let expandedStages = new Set();
  // Which stages' dated-notes log is expanded.
  let expandedStageNotes = new Set();
  // Unlike stages (collapsed by default), the Scheduled section starts open
  // — see the matching comment in team/project.html.
  let scheduledSectionOpen = true;

  // Photos are installation-site evidence, so only surface them under the
  // stages that are actually about physical install/QC/shipping work — they
  // looked out of place under Order Confirmed/Design & Proofing/Client
  // Approval, which are about the paperwork side of the project.
  const INSTALLATION_STAGES = ['Production', 'Shipping', 'Installed & Complete'];

  // Photos and scheduled-work items aren't explicitly tagged to a stage, so
  // infer which stage was active on a given date: whichever stage had the
  // latest started_at at or before that date.
  function stageForDate(dateValue, stageList) {
    if (!dateValue) return null;
    const t = new Date(dateValue).getTime();
    let match = null;
    for (const s of stageList) {
      if (!s.started_at) continue;
      const startT = new Date(s.started_at).getTime();
      if (startT <= t && (!match || startT > new Date(match.started_at).getTime())) match = s;
    }
    return match;
  }

  // scheduled_work items now carry an explicit stage_number, set by the
  // team when the item is created or edited — stageForDate above is only a
  // fallback display for rows created before that column existed.
  function stageNumberFor(item, stageList) {
    if (item.stage_number != null) return item.stage_number;
    const s = stageForDate(item.scheduled_date, stageList);
    return s ? s.stage_number : null;
  }

  async function loadDesignPacks() {
    const { files } = await api('/design-packs?projectId=' + projectId);
    designPacks = files;
  }

  async function loadStageNotes() {
    const { notes } = await api('/stage-notes?projectId=' + projectId);
    stageNotes = notes;
  }

  (async () => {
    currentUser = await requireRole(['client']);
    if (!currentUser) return;
    renderTopbar(currentUser, 'Signage Portal');
    initTabs();
    await loadSafely(loadScheduledWork);
    await loadSafely(loadDesignPacks);
    await loadSafely(loadStageNotes);
    await loadSafely(loadProject);
    await loadSafely(loadPhotos);
    await loadSafely(loadDocuments);
    await loadSafely(loadIssues);
    await loadSafely(loadQna);
  })();

  function initTabs() {
    document.querySelectorAll('#tab-bar .tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tab-bar .tab-btn').forEach((b) => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach((p) => p.classList.add('hidden'));
        btn.classList.add('active');
        document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.remove('hidden');
      });
    });
  }

  // Read-only counterpart to team's editable version — same running log of
  // dated notes per stage, no add form or delete control.
  function renderStageNotesLog(stageNumber) {
    const notes = stageNotes.filter((n) => n.stage_number === stageNumber);
    if (!notes.length) return '<p class="muted" style="margin:0;">No notes yet.</p>';
    return `
      <div class="stage-notes">
        ${notes.map((n) => `
          <div class="stage-note">
            <span class="stage-note-date">${fmtDateShort(n.entry_date)}</span>
            <span class="stage-note-text">${escapeHtml(n.note)}</span>
          </div>`).join('')}
      </div>`;
  }

  function renderStageNotesSection(stageNumber) {
    const count = stageNotes.filter((n) => n.stage_number === stageNumber).length;
    const isOpen = expandedStageNotes.has(stageNumber);
    return `
      <div class="stage-section">
        <button type="button" class="stage-section-toggle" data-notes-toggle="${stageNumber}">Notes (${count}) ${isOpen ? '▾' : '▸'}</button>
        <div class="${isOpen ? '' : 'hidden'}" id="stage-notes-body-${stageNumber}">${renderStageNotesLog(stageNumber)}</div>
      </div>`;
  }

  async function loadProject() {
    const { project } = await api('/projects/' + projectId);
    stages = project.stages;
    document.getElementById('project-header').innerHTML = `
      <h2>${escapeHtml(project.title)}</h2>
      <p><strong>Price:</strong> ${fmtMoney(project.client_price)}</p>
    `;
    renderProjectTimeline();
  }

  // Read-only counterpart to team's cross-stage "what's coming up" view —
  // see the matching comment in team/project.html.
  function renderScheduledSection() {
    const el = document.getElementById('scheduled-section');
    const upcoming = scheduledWorkItems
      .filter((i) => i.status !== 'complete')
      .slice()
      .sort((a, b) => new Date(a.scheduled_date) - new Date(b.scheduled_date));
    const isOpen = scheduledSectionOpen;
    el.innerHTML = `
      <div class="stage-section scheduled-section">
        <button type="button" class="stage-section-toggle" id="scheduled-toggle">Scheduled (${upcoming.length}) ${isOpen ? '▾' : '▸'}</button>
        <div class="${isOpen ? '' : 'hidden'}" id="scheduled-body">
          ${upcoming.length ? `
            <div class="breakdown-table-wrap">
              <table class="breakdown-table">
                <thead><tr><th>Item</th><th>Done</th><th>Scheduled</th><th>Status</th></tr></thead>
                <tbody>${upcoming.map(renderUpcomingItemRow).join('')}</tbody>
              </table>
            </div>` : '<p class="muted" style="margin:0;">Nothing scheduled.</p>'}
        </div>
      </div>`;
    el.querySelector('#scheduled-toggle').addEventListener('click', () => {
      scheduledSectionOpen = !scheduledSectionOpen;
      renderScheduledSection();
    });
  }

  // Distinct from renderScheduledItemRow (used inside a single stage's own
  // table, which has no reason to repeat that stage's name) — this row is
  // shown across every stage at once, so it labels which one each item
  // belongs to, and keeps the Scheduled-date column that per-stage tables
  // leave out as redundant with "which stage this is".
  function renderUpcomingItemRow(i) {
    const { tag, title } = splitSignType(i.description);
    const stage = stages.find((s) => s.stage_number === stageNumberFor(i, stages));
    return `
      <tr class="item-row tint-${i.status}">
        <td>
          ${tag ? `<span class="tag">${escapeHtml(tag)}</span>` : ''}${escapeHtml(title)}${i.quantity > 1 ? ` <span class="qty-badge">&times;${i.quantity}</span>` : ''}
          ${stage ? `<div class="muted">${escapeHtml(stage.name)}</div>` : ''}
          ${i.notes ? `<div class="item-notes">📝 ${escapeHtml(i.notes)}</div>` : ''}
        </td>
        <td data-label="Done">${i.completed_quantity}/${i.quantity}</td>
        <td data-label="Scheduled">${fmtScheduledDate(i.scheduled_date)}</td>
        <td data-label="Status"><span class="badge ${i.status}">${i.status.replace('_', ' ')}</span></td>
      </tr>`;
  }

  // Separated from loadProject so a group-toggle or stage-expand click
  // (pure UI state, no new data) can re-render locally instead of
  // re-fetching over the network.
  function renderProjectTimeline() {
    renderScheduledSection();
    document.getElementById('timeline').innerHTML = stages.map((s) => `
      <li class="${s.status}">
        <div class="timeline-row">
          <span class="dot">${s.status === 'complete' ? '✓' : s.stage_number}</span>
          <button type="button" class="stage-header" data-stage-toggle="${s.stage_number}">
            <div class="timeline-info">
              <strong>${escapeHtml(s.name)}</strong>
              <div class="meta">${s.completed_at ? '📅 Completed ' + fmtDateShort(s.completed_at) : s.started_at ? '📅 Started ' + fmtDateShort(s.started_at) : ''}</div>
            </div>
            <span class="stage-expand-arrow">${expandedStages.has(s.stage_number) ? '▾' : '▸'}</span>
          </button>
          <span class="badge ${s.status}">${s.status.replace('_', ' ')}</span>
        </div>
        <div class="stage-body${expandedStages.has(s.stage_number) ? '' : ' hidden'}" id="stage-body-${s.stage_number}"></div>
      </li>`).join('');

    expandedStages.forEach((stageNumber) => {
      const el = document.getElementById('stage-body-' + stageNumber);
      if (el) renderStageBody(stageNumber, el);
    });

    document.querySelectorAll('.stage-header').forEach((btn) => {
      btn.addEventListener('click', () => {
        const stageNumber = Number(btn.dataset.stageToggle);
        const bodyEl = document.getElementById('stage-body-' + stageNumber);
        const isHidden = bodyEl.classList.contains('hidden');
        if (isHidden) {
          expandedStages.add(stageNumber);
          renderStageBody(stageNumber, bodyEl);
        } else {
          expandedStages.delete(stageNumber);
        }
        bodyEl.classList.toggle('hidden', !isHidden);
        btn.querySelector('.stage-expand-arrow').textContent = isHidden ? '▾' : '▸';
      });
    });
  }

  // Read-only counterpart to team's renderStageBody — items scoped to this
  // stage's explicit stage_number (Installed & Complete included, same as
  // every other stage), photos, design pack, and the notes log.
  function renderStageBody(stageNumber, el) {
    const stage = stages.find((s) => s.stage_number === stageNumber);

    const itemsHtml = renderGroupedItemsTable(
      scheduledWorkItems.filter((i) => stageNumberFor(i, stages) === stageNumber),
      getStageExpandedTags(stageNumber)
    );

    let photoHtml = '';
    if (INSTALLATION_STAGES.includes(stage.name)) {
      const photos = allPhotos.filter((p) => stageForDate(p.created_at, stages) === stage);
      photoHtml = photos.length ? `
        <div class="photo-grid">
          ${photos.map((p) => `
            <a class="photo-thumb" href="#" data-file-url="/api/photo-file/${p.id}">
              <img data-src="/api/photo-file/${p.id}" alt="${escapeHtml(p.caption || '')}">
              <span class="photo-caption">📅 ${fmtDateShort(p.created_at)}${p.caption ? ' &middot; ' + escapeHtml(p.caption) : ''}</span>
            </a>`).join('')}
        </div>` : '';
    }

    let designPackHtml = '';
    if (stage.name === 'Design & Proofing') {
      designPackHtml = designPacks.length ? `
        <div class="design-pack-section">
          ${designPacks.map((f) => `
            <a class="list-item" href="#" data-file-url="/api/design-pack-file/${f.id}">
              <div><div class="title">📎 ${escapeHtml(f.filename)}</div><div class="meta">Uploaded ${fmtDateShort(f.created_at)}</div></div>
            </a>`).join('')}
        </div>` : '';
    }

    const notesHtml = renderStageNotesSection(stageNumber);

    el.innerHTML = `${designPackHtml}${photoHtml}${itemsHtml || '<p class="muted" style="margin:0;">No items scheduled under this stage yet.</p>'}${notesHtml}`;
    wireFileLinks(el);
    wireGroupToggles(el, getStageExpandedTags(stageNumber), () => renderStageBody(stageNumber, el));

    el.querySelector('[data-notes-toggle]').addEventListener('click', () => {
      if (expandedStageNotes.has(stageNumber)) expandedStageNotes.delete(stageNumber);
      else expandedStageNotes.add(stageNumber);
      renderStageBody(stageNumber, el);
    });
  }

  function renderScheduledItemRow(i) {
    const { tag, title } = splitSignType(i.description);
    return `
      <tr class="item-row tint-${i.status}">
        <td>
          ${tag ? `<span class="tag">${escapeHtml(tag)}</span>` : ''}${escapeHtml(title)}${i.quantity > 1 ? ` <span class="qty-badge">&times;${i.quantity}</span>` : ''}
          ${i.notes ? `<div class="item-notes">📝 ${escapeHtml(i.notes)}</div>` : ''}
        </td>
        <td data-label="Done">${i.completed_quantity}/${i.quantity}</td>
        <td data-label="Status"><span class="badge ${i.status}">${i.status.replace('_', ' ')}</span></td>
      </tr>`;
  }

  // Groups items by sign type with a collapsible header per group — see
  // the matching comment in team/project.html for why (Installed & Complete
  // shows literally every item in the project, so leaving every group
  // expanded turns it into a wall of rows). Read-only: no action buttons,
  // just the toggle.
  function renderGroupedItemsTable(items, expandedTags) {
    if (!items.length) return '';
    const groups = new Map();
    items.forEach((i) => {
      const tag = splitSignType(i.description).tag || 'Other';
      if (!groups.has(tag)) groups.set(tag, []);
      groups.get(tag).push(i);
    });
    const rows = Array.from(groups.keys()).sort((a, b) => a.localeCompare(b)).map((tag) => {
      const groupItems = groups.get(tag);
      const total = groupItems.reduce((sum, i) => sum + (i.quantity || 1), 0);
      const complete = groupItems.reduce((sum, i) => sum + (i.completed_quantity || 0), 0);
      const isOpen = expandedTags.has(tag);
      const groupStatus = complete >= total ? 'complete' : complete > 0 ? 'progress' : 'scheduled';
      const headerRow = `
        <tr class="breakdown-table-group status-${groupStatus}-row">
          <td colspan="3">
            <button type="button" class="group-toggle" data-toggle-group="${escapeHtml(tag)}">
              <span class="group-toggle-arrow">${isOpen ? '▾' : '▸'}</span>
              ${escapeHtml(tag)}
              <span class="muted">&middot; ${groupItems.length} item${groupItems.length === 1 ? '' : 's'} &middot; ${complete}/${total} complete</span>
            </button>
          </td>
        </tr>`;
      return headerRow + (isOpen ? groupItems.map(renderScheduledItemRow).join('') : '');
    }).join('');
    return `
      <div class="breakdown-table-wrap">
        <table class="breakdown-table">
          <thead><tr><th>Item</th><th>Done</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function wireGroupToggles(el, expandedTags, rerender) {
    el.querySelectorAll('button[data-toggle-group]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.toggleGroup;
        if (expandedTags.has(tag)) expandedTags.delete(tag); else expandedTags.add(tag);
        rerender();
      });
    });
  }

  async function loadPhotos() {
    const { photos } = await api('/photos?projectId=' + projectId);
    allPhotos = photos;
    const el = document.getElementById('photo-grid');
    if (!photos.length) {
      el.innerHTML = '<p class="muted">No photos uploaded yet.</p>';
      return;
    }
    const groups = new Map();
    photos.forEach((p) => {
      const day = fmtDateOnly(p.created_at);
      if (!groups.has(day)) groups.set(day, []);
      groups.get(day).push(p);
    });
    el.innerHTML = Array.from(groups.entries()).map(([day, items]) => `
      <div class="photo-day">
        <h3 class="photo-day-heading">${escapeHtml(day)}</h3>
        <div class="photo-grid">
          ${items.map((p) => `
            <a class="photo-thumb" href="#" data-file-url="/api/photo-file/${p.id}">
              <img data-src="/api/photo-file/${p.id}" alt="${escapeHtml(p.caption || '')}">
              ${p.caption ? `<span class="photo-caption">${escapeHtml(p.caption)}</span>` : ''}
            </a>`).join('')}
        </div>
      </div>`).join('');
    wireFileLinks(el);
  }

  // scheduled_date is a plain DATE column ("YYYY-MM-DD") — format the
  // string directly rather than going through `new Date()`, which would
  // apply the browser's timezone and can shift the date by a day.
  function fmtScheduledDate(value) {
    if (!value) return '—';
    const [year, month, day] = String(value).slice(0, 10).split('-');
    return `${month}/${day}/${year}`;
  }

  // Tracker descriptions are entered as "CODE — rest of description"
  // (e.g. "ID11 — Supply & Install SAV returns"). Split the code out so it
  // can be shown as its own scannable tag instead of buried in the text.
  function splitSignType(description) {
    const match = description.match(/^([A-Z0-9]{2,6})\s*—\s*(.+)$/);
    return match ? { tag: match[1], title: match[2] } : { tag: null, title: description };
  }

  // Items live only in Program now (see renderStageBody) — this just keeps
  // scheduledWorkItems current for whichever stage bodies are expanded.
  async function loadScheduledWork() {
    const { items } = await api('/scheduled-work?projectId=' + projectId);
    scheduledWorkItems = items;
  }

  async function loadDocuments() {
    const { files } = await api('/project-documents?projectId=' + projectId);
    const el = document.getElementById('document-list');
    el.classList.remove('muted');
    el.innerHTML = files.length ? files.map((f) => `
      <div class="list-item">
        <a class="file-link" href="#" data-file-url="/api/project-document-file/${f.id}">
          <div class="title">📎 ${escapeHtml(f.filename)}</div>
          <div class="meta">Uploaded by ${escapeHtml(f.uploaded_by_name)} (${f.uploaded_by_role}) &middot; ${fmtDateShort(f.created_at)}</div>
        </a>
        ${f.uploaded_by === currentUser.id ? `<button type="button" class="btn danger" data-delete-doc="${f.id}">Delete</button>` : ''}
      </div>`).join('') : '<p class="muted">No documents uploaded yet.</p>';
    wireFileLinks(el);

    el.querySelectorAll('button[data-delete-doc]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this document? This cannot be undone.')) return;
        await api('/project-documents/' + btn.dataset.deleteDoc, { method: 'DELETE' });
        await loadDocuments();
      });
    });
  }

  document.getElementById('document-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = document.querySelector('#document-form input[name=document]').files[0];
    const errorEl = document.getElementById('document-error');
    errorEl.classList.add('hidden');
    if (!file) return;
    if (fileTooLarge(file)) {
      errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      await uploadFileInChunks(file, {
        kind: 'project-document',
        projectId,
        filename: file.name,
        contentType: file.type || 'application/octet-stream',
      });
      e.target.reset();
      await loadDocuments();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  function renderIssueResponses(responses) {
    if (!responses.length) return '';
    return `<div class="issue-responses">${responses.map((r) => `
      <div class="issue-response">
        <div class="meta">${escapeHtml(r.responder_name)} &middot; ${fmtDate(r.created_at)} &middot; <span class="badge ${r.status}">${r.status.replace('_', ' ')}</span></div>
        ${r.description ? `<div>${escapeHtml(r.description)}</div>` : ''}
        ${r.has_photo ? `<a href="#" data-file-url="/api/project-issue-response-file/${r.id}">photo</a>` : ''}
      </div>`).join('')}</div>`;
  }

  async function loadIssues() {
    const { issues } = await api('/project-issues?projectId=' + projectId);
    const el = document.getElementById('issues-list');
    el.classList.remove('muted');
    el.innerHTML = issues.length ? issues.map((i) => `
      <div class="list-item issue-item">
        <div class="issue-item-header">
          <div>
            <div class="title">${escapeHtml(i.description)}</div>
            <div class="meta">${fmtDate(i.created_at)}${i.has_photo ? ' &middot; <a href="#" data-file-url="/api/project-issue-file/' + i.id + '">photo</a>' : ''}</div>
          </div>
          <span class="badge ${i.status}">${i.status.replace('_', ' ')}</span>
        </div>
        ${renderIssueResponses(i.responses)}
      </div>`).join('') : '<p class="muted">No issues reported.</p>';
    wireFileLinks(el);
  }

  document.getElementById('issue-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const photo = form.get('photo');
    const errorEl = document.getElementById('issue-error');
    errorEl.classList.add('hidden');
    if (photo && photo.size && fileTooLarge(photo)) {
      errorEl.textContent = `"${photo.name}" is larger than 50MB — please attach a smaller photo.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      if (photo && photo.size) {
        await uploadFileInChunks(photo, {
          kind: 'issue-photo',
          projectId,
          description: form.get('description'),
          contentType: photo.type || 'application/octet-stream',
        });
      } else {
        await api('/project-issues', { method: 'POST', body: { projectId, description: form.get('description') } });
      }
      e.target.reset();
      await loadIssues();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  async function loadQna() {
    const { messages } = await api('/qna?projectId=' + projectId);
    const el = document.getElementById('qna-thread');
    el.innerHTML = messages.map((m) => `
      <div class="qna-msg ${m.sender_id === currentUser.id ? 'mine' : ''}">
        <div class="meta">${escapeHtml(m.sender_name)} (${m.sender_role}) &middot; ${fmtDate(m.created_at)}</div>
        <div>${escapeHtml(m.message)}</div>
      </div>`).join('') || '<p class="muted">No messages yet.</p>';
    el.scrollTop = el.scrollHeight;
  }

  document.getElementById('qna-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    await api('/qna', { method: 'POST', body: { projectId, message: form.get('message') } });
    e.target.reset();
    await loadQna();
  });
</script>
