<title>Project Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/client/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="project-header">Loading…</div>

  <div class="card">
    <h2>Timeline</h2>
    <ul class="timeline" id="timeline"></ul>
  </div>

  <div class="card">
    <h2>Photos</h2>
    <div id="photo-grid"></div>
  </div>

  <div class="card">
    <h2>Report an Issue</h2>
    <p class="muted">Noticed a problem with the install or the sign itself? Let us know.</p>
    <form id="issue-form">
      <label>Description<textarea name="description" rows="2" required placeholder="What's wrong?"></textarea></label>
      <label>Photo (optional)<input type="file" name="photo" accept="image/*"></label>
      <div class="actions"><button class="btn secondary" type="submit">Report Issue</button></div>
      <div class="error hidden" id="issue-error"></div>
    </form>
    <div id="issues-list" class="muted" style="margin-top:16px;">Loading…</div>
  </div>

  <div class="card">
    <h2>Questions &amp; Answers</h2>
    <div class="qna-thread" id="qna-thread"></div>
    <form id="qna-form">
      <textarea name="message" rows="2" placeholder="Ask a question about your project..." required></textarea>
      <div class="actions"><button class="btn" type="submit">Send</button></div>
    </form>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const projectId = qs('id');
  let currentUser;

  (async () => {
    currentUser = await requireRole(['client']);
    if (!currentUser) return;
    renderTopbar(currentUser, 'Signage Portal');
    await loadProject();
    await loadPhotos();
    await loadIssues();
    await loadQna();
  })();

  async function loadProject() {
    const { project } = await api('/projects/' + projectId);
    document.getElementById('project-header').innerHTML = `
      <h2>${escapeHtml(project.title)}</h2>
      <p><strong>Price:</strong> ${fmtMoney(project.client_price)}</p>
    `;
    document.getElementById('timeline').innerHTML = project.stages.map((s) => `
      <li class="${s.status}">
        <span class="dot">${s.status === 'complete' ? '✓' : s.stage_number}</span>
        <div>
          <div><strong>${escapeHtml(s.name)}</strong> <span class="badge ${s.status}">${s.status.replace('_', ' ')}</span></div>
          <div class="meta muted">${s.completed_at ? 'Completed ' + fmtDate(s.completed_at) : s.started_at ? 'Started ' + fmtDate(s.started_at) : ''}</div>
        </div>
      </li>`).join('');
  }

  async function loadPhotos() {
    const { photos } = await api('/photos?projectId=' + projectId);
    const el = document.getElementById('photo-grid');
    if (!photos.length) {
      el.innerHTML = '<p class="muted">No photos uploaded yet.</p>';
      return;
    }
    const groups = new Map();
    photos.forEach((p) => {
      const day = fmtDateOnly(p.created_at);
      if (!groups.has(day)) groups.set(day, []);
      groups.get(day).push(p);
    });
    el.innerHTML = Array.from(groups.entries()).map(([day, items]) => `
      <div class="photo-day">
        <h3 class="photo-day-heading">${escapeHtml(day)}</h3>
        <div class="photo-grid">
          ${items.map((p) => `
            <a class="photo-thumb" href="/api/photo-file/${p.id}" target="_blank">
              <img src="/api/photo-file/${p.id}" alt="${escapeHtml(p.caption || '')}">
              ${p.caption ? `<span class="photo-caption">${escapeHtml(p.caption)}</span>` : ''}
            </a>`).join('')}
        </div>
      </div>`).join('');
  }

  async function loadIssues() {
    const { issues } = await api('/project-issues?projectId=' + projectId + '&source=client');
    const el = document.getElementById('issues-list');
    el.classList.remove('muted');
    el.innerHTML = issues.length ? issues.map((i) => `
      <div class="list-item">
        <div>
          <div class="title">${escapeHtml(i.description)}</div>
          <div class="meta">${fmtDate(i.created_at)}${i.has_photo ? ' &middot; <a href="/api/project-issue-file/' + i.id + '" target="_blank">photo</a>' : ''}</div>
        </div>
        <span class="badge ${i.status}">${i.status}</span>
      </div>`).join('') : '<p class="muted">No issues reported.</p>';
  }

  document.getElementById('issue-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const photo = form.get('photo');
    const errorEl = document.getElementById('issue-error');
    errorEl.classList.add('hidden');
    if (photo && photo.size && fileTooLarge(photo)) {
      errorEl.textContent = `"${photo.name}" is larger than 50MB — please attach a smaller photo.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      if (photo && photo.size) {
        await uploadFileInChunks(photo, {
          kind: 'issue-photo',
          projectId,
          description: form.get('description'),
          contentType: photo.type || 'application/octet-stream',
        });
      } else {
        await api('/project-issues', { method: 'POST', body: { projectId, description: form.get('description') } });
      }
      e.target.reset();
      await loadIssues();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  async function loadQna() {
    const { messages } = await api('/qna?projectId=' + projectId);
    const el = document.getElementById('qna-thread');
    el.innerHTML = messages.map((m) => `
      <div class="qna-msg ${m.sender_id === currentUser.id ? 'mine' : ''}">
        <div class="meta">${escapeHtml(m.sender_name)} (${m.sender_role}) &middot; ${fmtDate(m.created_at)}</div>
        <div>${escapeHtml(m.message)}</div>
      </div>`).join('') || '<p class="muted">No messages yet.</p>';
    el.scrollTop = el.scrollHeight;
  }

  document.getElementById('qna-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    await api('/qna', { method: 'POST', body: { projectId, message: form.get('message') } });
    e.target.reset();
    await loadQna();
  });
</script>
