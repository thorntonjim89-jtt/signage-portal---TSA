<title>Team Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <h2 class="section-heading">Pending Accounts</h2>
  <div id="pending-list" class="item-list muted">Loading…</div>

  <h2 class="section-heading">All Accounts</h2>
  <input type="text" id="accounts-search" placeholder="Search by name, email, or company…" style="margin-bottom:14px;">
  <div id="accounts-list" class="item-list muted">Loading…</div>

  <h2 class="section-heading">All Quotes</h2>
  <div id="quotes-list" class="item-list muted">Loading…</div>

  <h2 class="section-heading">All Projects</h2>
  <div id="projects-list" class="item-list muted">Loading…</div>
</main>
<script src="/js/api.js"></script>
<script>
  (async () => {
    const user = await requireRole(['team']);
    if (!user) return;
    renderTopbar(user, 'Signage Portal — Team');
    await loadPending();
    await loadAllAccounts();
    await loadQuotes();
    await loadProjects();
  })();

  async function loadPending() {
    const { users } = await api('/users?status=pending');
    const el = document.getElementById('pending-list');
    el.classList.remove('muted');
    el.innerHTML = users.length ? users.map((u) => `
      <div class="item-card">
        <div>
          <div class="title">${escapeHtml(u.name)} <span class="badge pending">${u.role}</span></div>
          <div class="meta">${escapeHtml(u.email)}${u.company_name ? ' &middot; ' + escapeHtml(u.company_name) : ''} &middot; Requested ${fmtDate(u.created_at)}</div>
        </div>
        <div class="actions" style="margin-top:0;">
          <button class="btn" data-id="${u.id}" data-status="approved">Approve</button>
          <button class="btn secondary" data-id="${u.id}" data-status="rejected">Reject</button>
        </div>
      </div>`).join('') : '<p class="muted">No pending accounts.</p>';

    el.querySelectorAll('button[data-status]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await api('/users/' + btn.dataset.id, { method: 'PATCH', body: { status: btn.dataset.status } });
        await loadPending();
        await loadAllAccounts();
      });
    });
  }

  let allAccounts = [];

  async function loadAllAccounts() {
    const { users } = await api('/users');
    allAccounts = users;
    renderAllAccounts();
  }

  function renderAllAccounts() {
    const el = document.getElementById('accounts-list');
    el.classList.remove('muted');
    const q = document.getElementById('accounts-search').value.trim().toLowerCase();
    const filtered = q
      ? allAccounts.filter((u) =>
          u.name.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q) ||
          (u.company_name || '').toLowerCase().includes(q))
      : allAccounts;

    el.innerHTML = filtered.length ? filtered.map((u) => `
      <div class="item-card">
        <div>
          <div class="title">${escapeHtml(u.name)} <span class="badge">${u.role}</span> <span class="badge ${u.status}">${u.status}</span></div>
          <div class="meta">${escapeHtml(u.email)}${u.company_name ? ' &middot; ' + escapeHtml(u.company_name) : ''} &middot; Joined ${fmtDate(u.created_at)}</div>
        </div>
        <div class="actions" style="margin-top:0;">
          ${u.status === 'pending' ? `<button class="btn" data-id="${u.id}" data-status="approved">Approve</button><button class="btn secondary" data-id="${u.id}" data-status="rejected">Reject</button>` : ''}
          ${u.status === 'approved' ? `<button class="btn danger" data-id="${u.id}" data-status="rejected">Deactivate</button>` : ''}
          ${u.status === 'rejected' ? `<button class="btn secondary" data-id="${u.id}" data-status="approved">Reactivate</button>` : ''}
        </div>
      </div>`).join('') : '<p class="muted">No accounts match.</p>';

    el.querySelectorAll('button[data-status]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await api('/users/' + btn.dataset.id, { method: 'PATCH', body: { status: btn.dataset.status } });
        await loadPending();
        await loadAllAccounts();
      });
    });
  }

  document.getElementById('accounts-search').addEventListener('input', renderAllAccounts);

  async function loadQuotes() {
    const { quotes } = await api('/quotes');
    const el = document.getElementById('quotes-list');
    el.classList.remove('muted');
    el.innerHTML = quotes.length ? quotes.map((q) => `
      <a class="item-card" href="/team/quote.html?id=${q.id}">
        <div>
          <div class="title">${escapeHtml(q.title)}</div>
          <div class="meta">Requested ${fmtDate(q.created_at)}${q.client_price ? ' &middot; client price ' + fmtMoney(q.client_price) : ''}</div>
        </div>
        <span class="badge ${q.status}">${q.status}</span>
      </a>`).join('') : '<p class="muted">No quotes yet.</p>';
  }

  async function loadProjects() {
    const { projects } = await api('/projects');
    const el = document.getElementById('projects-list');
    el.classList.remove('muted');
    el.innerHTML = projects.length ? projects.map((p) => `
      <a class="item-card" href="/team/project.html?id=${p.id}">
        <div>
          <div class="title">${escapeHtml(p.title)}</div>
          <div class="meta">Stage ${p.current_stage} of 7</div>
        </div>
        <span class="badge ${p.status}">${p.status === 'complete' ? 'Complete' : 'In progress'}</span>
      </a>`).join('') : '<p class="muted">No projects yet.</p>';
  }
</script>
