<title>Project Detail — Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/team/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="project-header">Loading…</div>

  <div class="card">
    <h2>Timeline</h2>
    <ul class="timeline" id="timeline"></ul>
  </div>

  <div class="card">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="photos">Photos</button>
      <button class="tab-btn" data-tab="scheduled-work">Scheduled Work</button>
      <button class="tab-btn" data-tab="documents">Documents</button>
      <button class="tab-btn" data-tab="client-issues">Client Issues</button>
      <button class="tab-btn" data-tab="supplier-issues">Supplier Issues</button>
      <button class="tab-btn" data-tab="qna">Q&amp;A</button>
    </div>

    <div class="tab-panel" data-panel="photos">
      <form id="photo-form">
        <label>Photo(s)<input type="file" name="photo" accept="image/*" multiple required></label>
        <label>Caption<input type="text" name="caption" placeholder="Optional caption, applied to all selected photos"></label>
        <label>Date taken (optional)<input type="date" name="takenAt"></label>
        <div class="actions"><button class="btn secondary" type="submit">Upload Photo(s)</button></div>
        <div class="error hidden" id="photo-error"></div>
        <p class="muted hidden" id="photo-progress"></p>
      </form>
      <div id="photo-grid" style="margin-top:16px;"></div>
    </div>

    <div class="tab-panel hidden" data-panel="scheduled-work">
      <form id="scheduled-work-form">
        <label>Description<input type="text" name="description" required placeholder="e.g. Ceiling signage install — Levels 23-28"></label>
        <label>Scheduled date<input type="date" name="scheduledDate" required></label>
        <div class="actions"><button class="btn secondary" type="submit">Add Scheduled Work</button></div>
        <div class="error hidden" id="scheduled-work-error"></div>
      </form>
      <div class="tab-bar" id="scheduled-work-subtabs" style="margin-top:16px;">
        <button class="tab-btn active" data-subtab="upcoming">Upcoming</button>
        <button class="tab-btn" data-subtab="completed">Completed</button>
      </div>
      <div id="scheduled-work-list" class="muted">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="documents">
      <form id="document-form">
        <label>Document<input type="file" name="document" required></label>
        <div class="actions"><button class="btn secondary" type="submit">Upload Document</button></div>
        <div class="error hidden" id="document-error"></div>
      </form>
      <div id="document-list" class="muted" style="margin-top:16px;">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="client-issues">
      <div id="client-issues-list" class="muted">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="supplier-issues">
      <div id="supplier-issues-list" class="muted">Loading…</div>
    </div>

    <div class="tab-panel hidden" data-panel="qna">
      <div class="qna-thread" id="qna-thread"></div>
      <form id="qna-form">
        <textarea name="message" rows="2" placeholder="Reply to the client..." required></textarea>
        <div class="actions"><button class="btn" type="submit">Send</button></div>
      </form>
    </div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const projectId = qs('id');
  let currentUser;
  let stages = [];
  let scheduledWorkItems = [];
  let allPhotos = [];
  let designPacks = [];

  // Photos are installation-site evidence, so only surface them under the
  // stages that are actually about physical install/QC/shipping work — they
  // looked out of place under Order Confirmed/Design & Proofing/Client
  // Approval, which are about the paperwork side of the project.
  const INSTALLATION_STAGES = ['Production', 'Quality Check', 'Shipping', 'Installed & Complete'];

  // Photos and scheduled-work items aren't explicitly tagged to a stage, so
  // infer which stage was active on a given date: whichever stage had the
  // latest started_at at or before that date.
  function stageForDate(dateValue, stageList) {
    if (!dateValue) return null;
    const t = new Date(dateValue).getTime();
    let match = null;
    for (const s of stageList) {
      if (!s.started_at) continue;
      const startT = new Date(s.started_at).getTime();
      if (startT <= t && (!match || startT > new Date(match.started_at).getTime())) match = s;
    }
    return match;
  }

  async function loadDesignPacks() {
    const { files } = await api('/design-packs?projectId=' + projectId);
    designPacks = files;
  }

  (async () => {
    currentUser = await requireRole(['team']);
    if (!currentUser) return;
    renderTopbar(currentUser, 'Signage Portal — Team');
    initTabs();
    await loadScheduledWork();
    await loadDesignPacks();
    await loadProject();
    await loadPhotos();
    await loadDocuments();
    await loadIssues('client');
    await loadIssues('supplier');
    await loadQna();
  })();

  function initTabs() {
    document.querySelectorAll('#tab-bar .tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tab-bar .tab-btn').forEach((b) => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach((p) => p.classList.add('hidden'));
        btn.classList.add('active');
        document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.remove('hidden');
      });
    });
  }

  async function loadProject() {
    const { project } = await api('/projects/' + projectId);
    stages = project.stages;
    document.getElementById('project-header').innerHTML = `
      <h2>${escapeHtml(project.title)}</h2>
      <p><strong>Client price:</strong> ${fmtMoney(project.client_price)}</p>
    `;
    renderTimeline();
  }

  function scheduledWorkSummary() {
    if (!scheduledWorkItems.length) return null;
    const complete = scheduledWorkItems.filter((i) => i.status === 'complete').length;
    return `${complete} of ${scheduledWorkItems.length} scheduled items complete`;
  }

  function renderTimeline() {
    document.getElementById('timeline').innerHTML = stages.map((s) => `
      <li class="${s.status}">
        <span class="dot">${s.status === 'complete' ? '✓' : s.stage_number}</span>
        <div class="timeline-info">
          <strong>${escapeHtml(s.name)}</strong>
          <div class="meta">${s.completed_at ? '📅 Completed ' + fmtDateShort(s.completed_at) : s.started_at ? '📅 Started ' + fmtDateShort(s.started_at) : ''}</div>
          ${s.name === 'Installed & Complete' && scheduledWorkSummary() ? `<div class="meta">${scheduledWorkSummary()}</div>` : ''}
          ${s.started_at ? `<button type="button" class="stage-detail-toggle" data-stage="${s.stage_number}">Details ▾</button><div class="stage-detail hidden" id="stage-detail-${s.stage_number}"></div>` : ''}
        </div>
        <span class="badge ${s.status}">${s.status.replace('_', ' ')}</span>
        <div class="stage-actions">
          ${s.status !== 'in_progress' ? `<button class="btn secondary" data-stage="${s.stage_number}" data-status="in_progress">Start</button>` : ''}
          ${s.status !== 'complete' ? `<button class="btn secondary" data-stage="${s.stage_number}" data-status="complete">Complete</button>` : ''}
        </div>
      </li>`).join('');

    document.querySelectorAll('#timeline button[data-status]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await api('/projects/' + projectId, {
          method: 'PATCH',
          body: { stageNumber: Number(btn.dataset.stage), status: btn.dataset.status },
        });
        await loadProject();
      });
    });

    document.querySelectorAll('.stage-detail-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const stageNumber = Number(btn.dataset.stage);
        const detailEl = document.getElementById('stage-detail-' + stageNumber);
        const isHidden = detailEl.classList.contains('hidden');
        if (isHidden) renderStageDetail(stageNumber, detailEl);
        detailEl.classList.toggle('hidden', !isHidden);
        btn.textContent = isHidden ? 'Details ▴' : 'Details ▾';
      });
    });
  }

  function renderStageDetail(stageNumber, el) {
    const stage = stages.find((s) => s.stage_number === stageNumber);
    const items = scheduledWorkItems.filter((i) => stageForDate(i.scheduled_date, stages) === stage);
    const itemsHtml = items.map(renderScheduledItemReadOnly).join('');

    let photoHtml = '';
    if (INSTALLATION_STAGES.includes(stage.name)) {
      const photos = allPhotos.filter((p) => stageForDate(p.created_at, stages) === stage);
      photoHtml = photos.length ? `
        <div class="photo-grid">
          ${photos.map((p) => `
            <a class="photo-thumb" href="#" data-file-url="/api/photo-file/${p.id}">
              <img data-src="/api/photo-file/${p.id}" alt="${escapeHtml(p.caption || '')}">
              <span class="photo-caption">📅 ${fmtDateShort(p.created_at)}${p.caption ? ' &middot; ' + escapeHtml(p.caption) : ''}</span>
            </a>`).join('')}
        </div>` : '';
    }

    let designPackHtml = '';
    if (stage.name === 'Design & Proofing') {
      designPackHtml = `
        <div class="design-pack-section">
          ${designPacks.length ? designPacks.map((f) => `
            <a class="list-item" href="#" data-file-url="/api/design-pack-file/${f.id}">
              <div><div class="title">📎 ${escapeHtml(f.filename)}</div><div class="meta">Uploaded ${fmtDateShort(f.created_at)}</div></div>
            </a>`).join('') : '<p class="muted" style="margin:0 0 10px;">No design pack uploaded yet.</p>'}
          <form class="design-pack-form">
            <label>Design pack (PDF, images, etc.)<input type="file" name="designPack" required></label>
            <div class="actions"><button class="btn secondary" type="submit">Upload Design Pack</button></div>
            <div class="error hidden"></div>
          </form>
        </div>`;
    }

    el.innerHTML = (photoHtml || itemsHtml || designPackHtml)
      ? `${designPackHtml}${photoHtml}${itemsHtml}`
      : '<p class="muted" style="margin:10px 0 0;">Nothing logged during this stage yet.</p>';
    wireFileLinks(el);

    const form = el.querySelector('.design-pack-form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = form.querySelector('input[name=designPack]').files[0];
        const errorEl = form.querySelector('.error');
        errorEl.classList.add('hidden');
        if (!file) return;
        if (fileTooLarge(file)) {
          errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
          errorEl.classList.remove('hidden');
          return;
        }
        try {
          await uploadFileInChunks(file, {
            kind: 'design-pack',
            projectId,
            filename: file.name,
            contentType: file.type || 'application/octet-stream',
          });
          await loadDesignPacks();
          renderStageDetail(stageNumber, el);
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.classList.remove('hidden');
        }
      });
    }
  }

  function renderScheduledItemReadOnly(i) {
    const { tag, title } = splitSignType(i.description);
    return `
      <div class="list-item">
        <div>
          <div class="title">${tag ? `<span class="tag">${escapeHtml(tag)}</span>` : ''}${escapeHtml(title)}</div>
          <div class="meta">Scheduled ${fmtScheduledDate(i.scheduled_date)}</div>
        </div>
        <span class="badge ${i.status}">${i.status}</span>
      </div>`;
  }

  async function loadPhotos() {
    const { photos } = await api('/photos?projectId=' + projectId);
    allPhotos = photos;
    const el = document.getElementById('photo-grid');
    if (!photos.length) {
      el.innerHTML = '<p class="muted">No photos uploaded yet.</p>';
      return;
    }
    const groups = new Map();
    photos.forEach((p) => {
      const day = fmtDateOnly(p.created_at);
      if (!groups.has(day)) groups.set(day, []);
      groups.get(day).push(p);
    });
    el.innerHTML = Array.from(groups.entries()).map(([day, items]) => `
      <div class="photo-day">
        <h3 class="photo-day-heading">${escapeHtml(day)}</h3>
        <div class="photo-grid">
          ${items.map((p) => `
            <a class="photo-thumb" href="#" data-file-url="/api/photo-file/${p.id}">
              <img data-src="/api/photo-file/${p.id}" alt="${escapeHtml(p.caption || '')}">
              ${p.caption ? `<span class="photo-caption">${escapeHtml(p.caption)}</span>` : ''}
            </a>`).join('')}
        </div>
      </div>`).join('');
    wireFileLinks(el);
  }

  document.getElementById('photo-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const files = document.querySelector('#photo-form input[name=photo]').files;
    const errorEl = document.getElementById('photo-error');
    const progressEl = document.getElementById('photo-progress');
    errorEl.classList.add('hidden');
    progressEl.classList.add('hidden');

    const tooLarge = Array.from(files).find(fileTooLarge);
    if (tooLarge) {
      errorEl.textContent = `"${tooLarge.name}" is larger than 50MB — please attach a smaller photo.`;
      errorEl.classList.remove('hidden');
      return;
    }

    const caption = form.get('caption');
    const takenAt = form.get('takenAt');
    const failed = [];
    progressEl.classList.remove('hidden');
    for (let i = 0; i < files.length; i += 1) {
      const file = files[i];
      progressEl.textContent = `Uploading ${i + 1} of ${files.length} (${file.name})…`;
      // If a date wasn't explicitly set (to apply to the whole batch), fall
      // back to each file's own last-modified date — for photos coming
      // straight off a phone/camera this is usually the date it was taken,
      // so a bulk upload of older site photos still sorts by their real
      // dates instead of every photo landing on today's upload date.
      const fileTakenAt = takenAt || (file.lastModified ? new Date(file.lastModified).toISOString().slice(0, 10) : undefined);
      try {
        await uploadFileInChunks(file, {
          kind: 'photo',
          projectId,
          contentType: file.type,
          caption: caption || undefined,
          takenAt: fileTakenAt,
        });
      } catch (err) {
        failed.push(`${file.name}: ${err.message}`);
      }
    }

    progressEl.classList.add('hidden');
    if (failed.length) {
      errorEl.textContent = `${files.length - failed.length} of ${files.length} uploaded. Failed: ${failed.join('; ')}`;
      errorEl.classList.remove('hidden');
    } else {
      e.target.reset();
    }
    await loadPhotos();
  });

  async function loadDocuments() {
    const { files } = await api('/project-documents?projectId=' + projectId);
    const el = document.getElementById('document-list');
    el.classList.remove('muted');
    el.innerHTML = files.length ? files.map((f) => `
      <a class="list-item" href="#" data-file-url="/api/project-document-file/${f.id}">
        <div>
          <div class="title">📎 ${escapeHtml(f.filename)}</div>
          <div class="meta">Uploaded by ${escapeHtml(f.uploaded_by_name)} (${f.uploaded_by_role}) &middot; ${fmtDateShort(f.created_at)}</div>
        </div>
      </a>`).join('') : '<p class="muted">No documents uploaded yet.</p>';
    wireFileLinks(el);
  }

  document.getElementById('document-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = document.querySelector('#document-form input[name=document]').files[0];
    const errorEl = document.getElementById('document-error');
    errorEl.classList.add('hidden');
    if (!file) return;
    if (fileTooLarge(file)) {
      errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      await uploadFileInChunks(file, {
        kind: 'project-document',
        projectId,
        filename: file.name,
        contentType: file.type || 'application/octet-stream',
      });
      e.target.reset();
      await loadDocuments();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  // scheduled_date is a plain DATE column ("YYYY-MM-DD") — format the
  // string directly rather than going through `new Date()`, which would
  // apply the browser's timezone and can shift the date by a day.
  function fmtScheduledDate(value) {
    if (!value) return '—';
    const [year, month, day] = String(value).slice(0, 10).split('-');
    return `${month}/${day}/${year}`;
  }

  // Tracker descriptions are entered as "CODE — rest of description"
  // (e.g. "ID11 — Supply & Install SAV returns"). Split the code out so it
  // can be shown as its own scannable tag instead of buried in the text.
  function splitSignType(description) {
    const match = description.match(/^([A-Z0-9]{2,6})\s*—\s*(.+)$/);
    return match ? { tag: match[1], title: match[2] } : { tag: null, title: description };
  }

  function renderScheduledItem(i) {
    const { tag, title } = splitSignType(i.description);
    return `
      <div class="list-item">
        <div>
          <div class="title">${tag ? `<span class="tag">${escapeHtml(tag)}</span>` : ''}${escapeHtml(title)}</div>
          <div class="meta">Scheduled ${fmtScheduledDate(i.scheduled_date)}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="badge ${i.status}">${i.status}</span>
          <button class="btn secondary" data-id="${i.id}" data-status="${i.status === 'scheduled' ? 'complete' : 'scheduled'}">${i.status === 'scheduled' ? 'Mark Complete' : 'Reopen'}</button>
        </div>
      </div>`;
  }

  let scheduledWorkSubtab = 'upcoming';

  function renderScheduledWorkList() {
    const el = document.getElementById('scheduled-work-list');
    el.classList.remove('muted');
    if (!scheduledWorkItems.length) {
      el.innerHTML = '<p class="muted">No scheduled work yet.</p>';
      return;
    }
    const wantStatus = scheduledWorkSubtab === 'upcoming' ? 'scheduled' : 'complete';
    const items = scheduledWorkItems.filter((i) => i.status === wantStatus);
    el.innerHTML = items.length
      ? items.map(renderScheduledItem).join('')
      : `<p class="muted">${scheduledWorkSubtab === 'upcoming' ? 'Nothing scheduled.' : 'Nothing completed yet.'}</p>`;

    el.querySelectorAll('button[data-status]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await api('/scheduled-work/' + btn.dataset.id, { method: 'PATCH', body: { status: btn.dataset.status } });
        await loadScheduledWork();
        renderTimeline();
      });
    });
  }

  document.querySelectorAll('#scheduled-work-subtabs .tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#scheduled-work-subtabs .tab-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      scheduledWorkSubtab = btn.dataset.subtab;
      renderScheduledWorkList();
    });
  });

  async function loadScheduledWork() {
    const { items } = await api('/scheduled-work?projectId=' + projectId);
    scheduledWorkItems = items;
    renderScheduledWorkList();
  }

  document.getElementById('scheduled-work-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const errorEl = document.getElementById('scheduled-work-error');
    errorEl.classList.add('hidden');
    try {
      await api('/scheduled-work', {
        method: 'POST',
        body: { projectId, description: form.get('description'), scheduledDate: form.get('scheduledDate') },
      });
      e.target.reset();
      await loadScheduledWork();
      renderTimeline();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  async function loadIssues(source) {
    const { issues } = await api('/project-issues?projectId=' + projectId + '&source=' + source);
    const el = document.getElementById(source + '-issues-list');
    el.classList.remove('muted');
    el.innerHTML = issues.length ? issues.map((i) => `
      <div class="list-item">
        <div>
          <div class="title">${escapeHtml(i.description)}</div>
          <div class="meta">${escapeHtml(i.reported_by_name)} &middot; ${fmtDate(i.created_at)}${i.has_photo ? ' &middot; <a href="#" data-file-url="/api/project-issue-file/' + i.id + '">photo</a>' : ''}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="badge ${i.status}">${i.status}</span>
          <button class="btn secondary" data-id="${i.id}" data-status="${i.status === 'open' ? 'resolved' : 'open'}">${i.status === 'open' ? 'Mark Resolved' : 'Reopen'}</button>
        </div>
      </div>`).join('') : `<p class="muted">No ${source} issues reported.</p>`;
    wireFileLinks(el);

    el.querySelectorAll('button[data-status]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await api('/project-issues/' + btn.dataset.id, { method: 'PATCH', body: { status: btn.dataset.status } });
        await loadIssues(source);
      });
    });
  }

  async function loadQna() {
    const { messages } = await api('/qna?projectId=' + projectId);
    const el = document.getElementById('qna-thread');
    el.innerHTML = messages.map((m) => `
      <div class="qna-msg ${m.sender_id === currentUser.id ? 'mine' : ''}">
        <div class="meta">${escapeHtml(m.sender_name)} (${m.sender_role}) &middot; ${fmtDate(m.created_at)}</div>
        <div>${escapeHtml(m.message)}</div>
      </div>`).join('') || '<p class="muted">No messages yet.</p>';
    el.scrollTop = el.scrollHeight;
  }

  document.getElementById('qna-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    await api('/qna', { method: 'POST', body: { projectId, message: form.get('message') } });
    e.target.reset();
    await loadQna();
  });
</script>
