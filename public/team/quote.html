<title>Quote Detail — Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<header class="topbar" id="topbar"></header>
<main>
  <p><a href="/team/dashboard.html">&larr; Back to dashboard</a></p>
  <div class="card" id="quote-card">Loading…</div>

  <div class="card">
    <h2>Documents</h2>
    <form id="file-form">
      <label>Attach a file<input type="file" name="file" required></label>
      <div class="actions"><button class="btn secondary" type="submit">Upload</button></div>
      <div class="error hidden" id="file-error"></div>
    </form>
    <div id="files-list" class="muted" style="margin-top:16px;">Loading…</div>
  </div>

  <div class="card">
    <h2>Supplier Pricing Requests</h2>
    <form id="supplier-form">
      <label>Supplier email<input type="email" name="supplierEmail" required placeholder="supplier@example.com"></label>
      <label>Message<input type="text" name="message" placeholder="Please quote your cost for this job"></label>
      <div class="actions"><button class="btn secondary" type="submit">Request Supplier Price</button></div>
      <div class="error hidden" id="supplier-error"></div>
    </form>
    <div id="supplier-requests" class="muted" style="margin-top:16px;">Loading…</div>
  </div>

  <div class="card">
    <h2>Set Client Price</h2>
    <form id="price-form">
      <label>Internal cost ($)<input type="number" step="0.01" min="0" name="internalCost" required></label>
      <label>Markup (%)<input type="number" step="0.1" min="0" name="markupPercent" required value="30"></label>
      <div class="actions"><button class="btn" type="submit">Save Pricing</button></div>
      <div class="error hidden" id="price-error"></div>
    </form>
  </div>

  <div class="card hidden" id="convert-card">
    <h2>Convert to Project</h2>
    <p class="muted">The client has accepted this quote. Convert it into a 7-stage project.</p>
    <label>Fabricating supplier (optional)
      <select id="convert-supplier">
        <option value="">In-house / none</option>
      </select>
    </label>
    <div class="actions"><button class="btn" id="convert-btn">Convert to Project</button></div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  const quoteId = qs('id');
  (async () => {
    const user = await requireRole(['team']);
    if (!user) return;
    renderTopbar(user, 'Signage Portal — Team');
    await load();
  })();

  async function load() {
    const { quote } = await api('/quotes/' + quoteId);
    document.getElementById('quote-card').innerHTML = `
      <h2>${escapeHtml(quote.title)} <span class="badge ${quote.status}">${quote.status}</span></h2>
      <p class="muted">${escapeHtml(quote.description || '')}</p>
      <p><strong>Quantity:</strong> ${quote.quantity}</p>
      <p><strong>Internal cost:</strong> ${fmtMoney(quote.internal_cost)} &middot; <strong>Markup:</strong> ${quote.internal_markup_percent != null ? quote.internal_markup_percent + '%' : '—'}</p>
      <p><strong>Client price:</strong> ${fmtMoney(quote.client_price)}</p>
    `;
    document.getElementById('convert-card').classList.toggle('hidden', quote.status !== 'accepted');
    await loadSupplierRequests();
    await loadFiles();
  }

  async function loadFiles() {
    const { files } = await api('/quote-files?quoteId=' + quoteId);
    const el = document.getElementById('files-list');
    el.classList.remove('muted');
    el.innerHTML = files.length
      ? files.map((f) => `
        <a class="list-item" href="/api/quote-file/${f.id}" target="_blank">
          <div>
            <div class="title">${escapeHtml(f.filename)}</div>
            <div class="meta">Uploaded ${fmtDate(f.created_at)}</div>
          </div>
        </a>`).join('')
      : '<p class="muted">No documents uploaded yet.</p>';
  }

  document.getElementById('file-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const file = form.get('file');
    const errorEl = document.getElementById('file-error');
    errorEl.classList.add('hidden');
    if (fileTooLarge(file)) {
      errorEl.textContent = `"${file.name}" is larger than 50MB — please attach a smaller file.`;
      errorEl.classList.remove('hidden');
      return;
    }
    try {
      await uploadFileInChunks(file, {
        kind: 'quote-file',
        quoteId,
        filename: file.name,
        contentType: file.type || 'application/octet-stream',
      });
      e.target.reset();
      await loadFiles();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  async function loadSupplierRequests() {
    const { requests } = await api('/supplier-requests?quoteId=' + quoteId);
    const el = document.getElementById('supplier-requests');
    el.classList.remove('muted');
    el.innerHTML = requests.length ? `<table>
      <thead><tr><th>Supplier</th><th>Status</th><th>Cost Price</th><th>Notes</th><th>Requested</th></tr></thead>
      <tbody>${requests.map((r) => `<tr>
        <td>${escapeHtml(r.supplier_name)}<br><span class="muted">${escapeHtml(r.supplier_email)}</span></td>
        <td><span class="badge ${r.status}">${r.status}</span></td>
        <td>${fmtMoney(r.cost_price)}</td>
        <td>${escapeHtml(r.notes || '')}</td>
        <td>${fmtDate(r.requested_at)}</td>
      </tr>`).join('')}</tbody>
    </table>` : '<p class="muted">No supplier requests yet.</p>';

    const select = document.getElementById('convert-supplier');
    select.innerHTML = '<option value="">In-house / none</option>' +
      requests.map((r) => `<option value="${r.supplier_id}">${escapeHtml(r.supplier_name)} (${escapeHtml(r.supplier_email)})</option>`).join('');
  }

  document.getElementById('supplier-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const errorEl = document.getElementById('supplier-error');
    errorEl.classList.add('hidden');
    try {
      await api('/supplier-requests', {
        method: 'POST',
        body: { quoteId, supplierEmail: form.get('supplierEmail'), message: form.get('message') },
      });
      e.target.reset();
      await loadSupplierRequests();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  document.getElementById('price-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const errorEl = document.getElementById('price-error');
    errorEl.classList.add('hidden');
    try {
      await api('/quotes/' + quoteId, {
        method: 'PATCH',
        body: { action: 'price', internalCost: Number(form.get('internalCost')), markupPercent: Number(form.get('markupPercent')) },
      });
      await load();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });

  document.getElementById('convert-btn').addEventListener('click', async () => {
    const supplierId = document.getElementById('convert-supplier').value;
    const { project } = await api('/projects', {
      method: 'POST',
      body: { quoteId, supplierId: supplierId ? Number(supplierId) : undefined },
    });
    window.location.href = '/team/project.html?id=' + project.id;
  });
</script>
